services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: basa_db
      POSTGRES_USER: basa_user
      POSTGRES_PASSWORD: basa_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U basa_user -d basa_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app

  frontend:
    build:
      context: ../DASH-cli/dashboard
      dockerfile: Dockerfile
      target: prod
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
